networks:
  katai-net:
    driver: bridge

services:
  # ── vLLM inference server ─────────────────────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:latest
    container_name: katai-vllm
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      # HF model cache — persists across restarts, avoids re-download (~54 GB)
      - ./.hf-cache:/root/.cache/huggingface
    ports:
      - "${VLLM_PORT:-8000}:8000"
    command: >
      --model ${MODEL_ID:-Qwen/Qwen3.6-27B}
      --port 8000
      --tensor-parallel-size 1
      --max-model-len ${MAX_MODEL_LEN:-131072}
      --dtype bfloat16
      --gpu-memory-utilization ${GPU_MEM_UTIL:-0.90}
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 300s
    networks:
      - katai-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    ipc: host

  # ── FastAPI backend proxy ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: katai-backend
    environment:
      - LLM_BASE_URL=http://vllm:8000
      - MODEL_ID=${MODEL_ID:-Qwen/Qwen3.6-27B}
      - MAX_TOKENS=${MAX_TOKENS:-4096}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      - HOST=0.0.0.0
      - PORT=8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      vllm:
        condition: service_healthy
    networks:
      - katai-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── React / Nginx frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: katai-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - katai-net
    restart: unless-stopped
