networks:
  katai-net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:

services:
  # ── vLLM inference server ─────────────────────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:latest
    container_name: katai-vllm
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      # HF model cache — persists across restarts, avoids re-download (~54 GB)
      - ./.hf-cache:/root/.cache/huggingface
    ports:
      - "${VLLM_PORT:-8000}:8000"
    command: >
      --model ${MODEL_ID:-Qwen/Qwen3-VL-30B-A3B-Instruct-FP8}
      --port 8000
      --tensor-parallel-size 1
      --max-model-len ${MAX_MODEL_LEN:-131072}
      --dtype auto
      --gpu-memory-utilization ${GPU_MEM_UTIL:-0.90}
      --max-num-seqs 32
      --max-num-batched-tokens 65536
      --enable-chunked-prefill
      --kv-cache-dtype fp8
      --limit-mm-per-prompt '{"video":1}'
      --mm-processor-kwargs '{"max_pixels":1204224,"fps":1.5}'
      --reasoning-parser qwen3
    # Qwen3-VL-30B-FP8: ~30GB weights (vs ~51GB BF16) → ~66GB KV headroom.
    # --max-num-seqs 32 (was 16) and --max-num-batched-tokens 65536 (was 32768)
    # exploit that headroom for higher concurrency and larger multimodal batches.
    # --dtype auto: FP8 checkpoint manages its own precision; never force bfloat16.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 300s
    networks:
      - katai-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    ipc: host

  # ── FastAPI backend proxy ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: katai-backend
    environment:
      - LLM_BASE_URL=http://vllm:8000
      - MODEL_ID=${MODEL_ID:-Qwen/Qwen3-VL-30B-A3B-Instruct-FP8}
      - MAX_TOKENS=${MAX_TOKENS:-4096}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      - HOST=0.0.0.0
      - PORT=8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      vllm:
        condition: service_healthy
    networks:
      - katai-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Whisper Large V3 transcription service ────────────────────────────────────
  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile
    container_name: katai-whisper
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Force Whisper to CPU — vLLM pre-allocates GPU_MEM_UTIL (~86GB on 96GB GPU),
      # leaving insufficient VRAM for Whisper large-v3. CPU transcription is
      # fast enough (~90s for 2.5-min audio) and runs sequentially before GPU
      # context analysis begins.
      - CUDA_VISIBLE_DEVICES=
      # Model cached alongside HF models
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - ./.hf-cache:/root/.cache/huggingface
    ports:
      - "${WHISPER_PORT:-9000}:9000"
    networks:
      - katai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    ipc: host

  # ── Neo4j knowledge graph ─────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: katai-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-katai_neo4j_2026}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"   # Neo4j browser
      - "7687:7687"   # Bolt (driver)
    networks:
      - katai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── React / Nginx frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: katai-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - katai-net
    restart: unless-stopped
